<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TIMAEUS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: black;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        .title {
            color: white;
            font-size: clamp(2rem, 10vw, 6rem);
            font-weight: bold;
            text-align: center;
            padding: 20px;
            max-width: 100%;
            word-break: break-word;
        }
    </style>
</head>
<body>
    <div class="title">TIMAEUS</div>
</body>
</html>
