<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TITLE</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            /* Используем 100% вместо 100vh, чтобы избежать проблем с адресной строкой */
            overflow: hidden;
            /* Отключаем скролл полностью */
        }
        
        body {
            background: black;
            display: flex;
            /* Используем flex вместо grid для лучшей совместимости */
            justify-content: center;
            /* Центрирование по горизонтали */
            align-items: center;
            /* Центрирование по вертикали */
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
        }
        
        .title {
            color: white;
            font-size: clamp(2rem, 10vw, 6rem);
            font-weight: bold;
            text-align: center;
            word-break: break-word;
            padding: 20px;
            max-width: 100%;
            /* Чтобы текст не выходил за границы */
            box-sizing: border-box;
            /* Паддинг включается в ширину */
        }
    </style>
</head>
<body>
    <div class="title">TITLE</div>
</body>
</html>
